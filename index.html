<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>交通工具类型组合气泡图</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #fbf7ec;
      --paper: #ffffff;
      --paper-soft: #fff8ec;
      --line: #eadbc4;
      --text: #3f3f3f;
      --muted: #77736c;
      --soft: #a59b8c;
      --accent: #ff6a2a;
      --accent-soft: #ffe4c7;
      --teal: #459dab;
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background: var(--bg);
    }

    .wrap {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 34px 28px 28px;
    }

    header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: end;
      margin-bottom: 14px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 34px;
      height: 2px;
      border-radius: 999px;
      background: var(--accent);
    }

    h1 {
      margin: 8px 0 0;
      color: var(--accent);
      font-size: clamp(28px, 4vw, 46px);
      line-height: 1.12;
      letter-spacing: 0;
      font-weight: 900;
    }

    .lead {
      margin: 12px 0 0;
      max-width: 760px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.65;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 112px);
      gap: 10px;
    }

    .stat {
      min-height: 78px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.72);
    }

    .stat strong {
      display: block;
      color: var(--accent);
      font-size: 28px;
      line-height: 1;
      margin-bottom: 8px;
    }

    .stat span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr;
      gap: 10px;
      padding: 12px;
      margin-bottom: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.68);
    }

    .control {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 0;
    }

    .control label {
      color: var(--soft);
      font-size: 12px;
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper-soft);
    }

    button {
      min-height: 38px;
      border: 0;
      border-radius: 6px;
      color: var(--text);
      background: transparent;
      cursor: pointer;
      font: inherit;
    }

    button:hover {
      background: var(--accent-soft);
    }

    button.active {
      background: var(--accent);
      color: #fff;
      font-weight: 900;
    }

    .slider-row {
      display: grid;
      grid-template-columns: 1fr 42px;
      gap: 10px;
      align-items: center;
      min-height: 38px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .slider-value {
      text-align: right;
      color: var(--accent);
      font-weight: 900;
    }

    .chart-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      box-shadow: 0 12px 30px rgba(174, 124, 70, .12);
      overflow: hidden;
    }

    .chart-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 18px 0;
    }

    .note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .legend i {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    #bubbleChart {
      display: block;
      width: 100%;
      height: min(72vh, 760px);
      min-height: 560px;
    }

    .bubble {
      cursor: pointer;
      filter: drop-shadow(0 8px 12px rgba(66, 99, 107, .18));
      transition: opacity .18s ease;
    }

    .bubble circle {
      stroke: rgba(255,255,255,.92);
      stroke-width: 1.5;
    }

    .bubble.selected circle {
      stroke: var(--accent);
      stroke-width: 3;
    }

    .bubble text {
      pointer-events: none;
      fill: #263235;
      font-weight: 900;
      text-anchor: middle;
      dominant-baseline: central;
      letter-spacing: 0;
    }

    .axis-label {
      fill: #9a9286;
      font-size: 12px;
    }

    .tooltip {
      position: fixed;
      z-index: 20;
      pointer-events: none;
      display: none;
      max-width: 300px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.96);
      color: var(--text);
      box-shadow: 0 12px 34px rgba(174, 124, 70, .22);
      transform: translate(-50%, calc(-100% - 14px));
    }

    .tooltip strong {
      display: block;
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .tooltip span {
      display: block;
      color: var(--muted);
      line-height: 1.55;
      font-size: 12px;
    }

    @media (max-width: 860px) {
      header, .toolbar {
        grid-template-columns: 1fr;
      }

      .stats {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      #bubbleChart {
        min-height: 520px;
      }
    }

    @media (max-width: 560px) {
      .wrap {
        padding: 16px;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .chart-head {
        flex-direction: column;
      }

      .legend {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <div class="eyebrow">车辆类型</div>
        <h1>车辆类型与伤亡程度</h1>
        <p class="lead">圆越大代表事故数量越多；颜色由浅青到橙红，表示伤残/死亡占比逐渐升高。</p>
      </div>
      <div class="stats">
        <div class="stat"><strong id="statTotal">-</strong><span>事故案例</span></div>
        <div class="stat"><strong id="statCombos">-</strong><span>交通工具组合</span></div>
        <div class="stat"><strong id="statRisk">-</strong><span>最高伤残/死亡率</span></div>
      </div>
    </header>

    <section class="toolbar" aria-label="气泡图控制">
      <div class="control">
        <label>气泡尺寸</label>
        <div class="segmented" id="metricButtons">
          <button type="button" class="active" data-metric="share">案例占比</button>
          <button type="button" data-metric="severeRate">伤残/死亡</button>
          <button type="button" data-metric="deathRate">死亡率</button>
        </div>
      </div>
      <div class="control">
        <label>涉及方数量</label>
        <div class="segmented" id="partyButtons">
          <button type="button" class="active" data-party="all">全部</button>
          <button type="button" data-party="2">2 方</button>
          <button type="button" data-party="3">3 方</button>
        </div>
      </div>
      <div class="control">
        <label>最小案例数</label>
        <div class="slider-row">
          <input id="minCount" type="range" min="1" max="30" value="1">
          <span class="slider-value" id="minCountValue">1</span>
        </div>
      </div>
    </section>

    <section class="chart-panel">
      <div class="chart-head">
        <div class="note">横向越靠右，案例占比越高；纵向越靠上，伤残/死亡占比越高。点击气泡可锁定高亮，悬停查看具体数据。</div>
        <div class="legend" id="legend"></div>
      </div>
      <svg id="bubbleChart" role="img" aria-label="交通工具类型组合事故气泡图"></svg>
    </section>
  </div>
  <div class="tooltip" id="tooltip"></div>

    const state = { metric: "share", party: "all", minCount: 1, selected: DATA.insights.highRisk.combo };
    const fmtPct = new Intl.NumberFormat("zh-CN", { style: "percent", maximumFractionDigits: 1 });
    const fmtNum = new Intl.NumberFormat("zh-CN");
    const svg = document.getElementById("bubbleChart");
    const tooltip = document.getElementById("tooltip");

    function colorForRisk(rate) {
      const stops = [
        [0.00, [205, 226, 231]],
        [0.18, [112, 185, 197]],
        [0.36, [63, 156, 171]],
        [0.76, [255, 106, 42]]
      ];
      let a = stops[0], b = stops[stops.length - 1];
      for (let i = 0; i < stops.length - 1; i++) {
        if (rate >= stops[i][0] && rate <= stops[i + 1][0]) {
          a = stops[i];
          b = stops[i + 1];
          break;
        }
      }
      const t = Math.max(0, Math.min(1, (rate - a[0]) / (b[0] - a[0] || 1)));

    function filteredCombos() {
      return DATA.combos.filter(row => {
        const partyOk = state.party === "all" || row.parties.includes(Number(state.party));
        return partyOk && row.count >= state.minCount;
      });
    }

    function metricRadius(row) {
      if (state.metric === "share") return row.count;
      if (state.metric === "severeRate") return Math.max(2, row.severeRate * DATA.total);
      return Math.max(1, row.deathRate * DATA.total);
    }

    function shortName(combo) {
      return combo.replaceAll("电动自行车+", "").replaceAll("+电动自行车", "+电动");
    }

    function updateStats(rows) {
      const highRisk = rows.reduce((best, row) => row.severeRate > best.severeRate ? row : best, rows[0] || DATA.insights.highRisk);

      document.getElementById("statCombos").textContent = fmtNum.format(rows.length);
      document.getElementById("statRisk").textContent = fmtPct.format(highRisk.severeRate);
      document.getElementById("minCountValue").textContent = state.minCount;
    }

    function renderLegend() {
      document.getElementById("legend").innerHTML = DATA.severityOrder.map(key => `
        <span><i style="background:${DATA.severityColors[key]}"></i>${DATA.severityLabels[key]}</span>
      `).join("");
    }

    function renderBubbles() {
      const rows = filteredCombos();
      updateStats(rows);
      renderLegend();

      const rect = svg.getBoundingClientRect();
      const width = Math.max(360, rect.width || 900);
      const height = Math.max(460, rect.height || 600);
      const pad = { left: 64, right: 48, top: 56, bottom: 62 };
      const maxCount = Math.max(...DATA.combos.map(d => d.count));
      const maxMetric = Math.max(...rows.map(metricRadius), 1);
      const xMax = Math.max(...DATA.combos.map(d => d.share), .01);
      const yMax = Math.max(...DATA.combos.map(d => d.severeRate), .01);

      svg.setAttribute("viewBox", `0 0 ${width} ${height}`);
      svg.innerHTML = `

        <text x="${width - pad.right}" y="${height - 24}" class="axis-label" text-anchor="end">案例占比更高 →</text>

      `;

      rows.forEach((row, i) => {
        const radius = 17 + Math.sqrt(metricRadius(row) / maxMetric) * 50;
        const x = pad.left + (row.share / xMax) * (width - pad.left - pad.right - radius * .8);
        const y = height - pad.bottom - (row.severeRate / yMax) * (height - pad.top - pad.bottom - radius * .8);
        const wobble = Math.sin((i + 1) * 1.8) * 16;
        row._x = Math.max(pad.left + radius, Math.min(width - pad.right - radius, x + wobble));
        row._y = Math.max(pad.top + radius, Math.min(height - pad.bottom - radius, y - wobble / 2));
        row._r = Math.min(radius, Math.sqrt(row.count / maxCount) * 55 + 18);
      });

      for (let iter = 0; iter < 80; iter++) {
        for (let i = 0; i < rows.length; i++) {
          for (let j = i + 1; j < rows.length; j++) {
            const a = rows[i], b = rows[j];
            const dx = b._x - a._x;
            const dy = b._y - a._y;
            const dist = Math.hypot(dx, dy) || 1;
            const minDist = a._r + b._r + 10;
            if (dist < minDist) {
              const move = (minDist - dist) / 2;
              const mx = dx / dist * move;
              const my = dy / dist * move;
              a._x -= mx; a._y -= my; b._x += mx; b._y += my;
            }
          }
        }
        rows.forEach(row => {
          row._x = Math.max(pad.left + row._r, Math.min(width - pad.right - row._r, row._x));
          row._y = Math.max(pad.top + row._r, Math.min(height - pad.bottom - row._r, row._y));
        });
      }

      rows.forEach(row => {
        const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
        g.setAttribute("class", `bubble${row.combo === state.selected ? " selected" : ""}`);
        g.setAttribute("transform", `translate(${row._x} ${row._y})`);

        const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        circle.setAttribute("r", row._r);
        circle.setAttribute("fill", colorForRisk(row.severeRate));
        circle.setAttribute("fill-opacity", ".92");
        g.appendChild(circle);

        const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
        label.textContent = shortName(row.combo);
        label.setAttribute("font-size", Math.max(10, Math.min(17, row._r / 3.2)));
        label.setAttribute("y", "-5");
        g.appendChild(label);

        const sub = document.createElementNS("http://www.w3.org/2000/svg", "text");
        sub.textContent = `${row.count}起 | ${fmtPct.format(row.severeRate)}`;
        sub.setAttribute("font-size", Math.max(9, Math.min(13, row._r / 4.4)));
        sub.setAttribute("y", Math.max(10, row._r / 3.5));
        sub.setAttribute("fill-opacity", ".78");
        g.appendChild(sub);

        g.addEventListener("click", () => {
          state.selected = row.combo;
          renderBubbles();
        });
        g.addEventListener("mousemove", event => showTooltip(event, row));
        g.addEventListener("mouseleave", hideTooltip);
        svg.appendChild(g);
      });

      document.querySelectorAll("#metricButtons button").forEach(btn => btn.classList.toggle("active", btn.dataset.metric === state.metric));
      document.querySelectorAll("#partyButtons button").forEach(btn => btn.classList.toggle("active", btn.dataset.party === state.party));
    }

    function showTooltip(event, row) {
      tooltip.style.display = "block";
      tooltip.style.left = `${event.clientX}px`;
      tooltip.style.top = `${event.clientY}px`;
      tooltip.innerHTML = `
        <strong>${row.combo}</strong>
        <span>案例数：${row.count} 起，占全部 ${fmtPct.format(row.share)}</span>
        <span>伤残/死亡：${row.severeCount} 起，${fmtPct.format(row.severeRate)}</span>
        <span>死亡：${row.deathCount} 起，${fmtPct.format(row.deathRate)}</span>
        <span>涉及方数量：${row.partyLabel} 方</span>
      `;
    }

    function hideTooltip() {
      tooltip.style.display = "none";
    }

    document.getElementById("metricButtons").addEventListener("click", event => {
      const btn = event.target.closest("button");
      if (!btn) return;
      state.metric = btn.dataset.metric;
      renderBubbles();
    });

    document.getElementById("partyButtons").addEventListener("click", event => {
      const btn = event.target.closest("button");
      if (!btn) return;
      state.party = btn.dataset.party;
      renderBubbles();
    });

    document.getElementById("minCount").addEventListener("input", event => {
      state.minCount = Number(event.target.value);
      renderBubbles();
    });

    window.addEventListener("resize", () => {
      clearTimeout(window.__bubbleResize);
      window.__bubbleResize = setTimeout(renderBubbles, 150);
    });

    renderBubbles();
  </script>
</body>
</html>
